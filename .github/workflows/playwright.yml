name: Playwright E2E Tests

# 1. Gatilhos (Triggers) de execução: quando a esteira vai rodar
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# 2. Permissões de escrita e leitura na esteira
permissions:
  contents: read

jobs:
  run-tests:
    # 3. Sistema Operacional onde os testes serão executados
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixar o código do repositório para o servidor do GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # Passo 2: Configurar o Python no servidor
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Cache de dependências para as próximas execuções serem super rápidas!

    # Passo 3: Instalar as dependências do requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Passo 4: Instalar os navegadores do Playwright E suas dependências do Ubuntu (essencial para CI)
    - name: Install Playwright browsers and system dependencies
      run: playwright install --with-deps

    # Passo 5: Executar os testes (em segundo plano/headless por padrão na CI)
    - name: Run E2E Tests
      run: pytest -n auto

    # Passo 6: Guardar o relatório HTML gerado como um artefato de build no GitHub
    # Isso permite que você baixe o relatório diretamente do site do GitHub em caso de falha!
    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      if: always() # Garante que o relatório será salvo mesmo se os testes falharem!
      with:
        name: pytest-html-report
        path: reports/
        retention-days: 30
